<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Maze Runner - 2026 Edition</title>
    <style>
        :root {
            --bg: #020617;
            --accent: #22d3ee;
            --accent-glow: rgba(34, 211, 238, 0.4);
            --goal: #4ade80;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --ads-bg: #1e293b;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Estilos do Pop-up (Atualizados) --- */
        #popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            
            /* Animação de Entrada do Overlay */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        /* Classe para ativar o pop-up (chamada no JS) */
        #popup-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .popup-content {
            background: var(--ads-bg);
            border: 2px solid var(--accent);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            position: relative;
            max-width: 400px;
            width: 85%;
            box-shadow: 0 0 40px var(--accent-glow), 0 10px 30px rgba(0,0,0,0.7);
            
            /* Animação de Entrada do Conteúdo: Escala e Opacidade */
            opacity: 0;
            transform: scale(0.7) translateY(20px);
            transition: opacity 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Classe para ativar a animação do conteúdo (chamada no JS) */
        #popup-overlay.active .popup-content {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .popup-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .popup-link {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(34, 211, 238, 0.3);
        }

        .popup-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(34, 211, 238, 0.5);
        }

        #close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
            display: none; /* Escondido inicialmente */
        }

        #close-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        #timer-display {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-top: 15px;
            color: #ccc;
        }

        /* Banner de Propaganda Original */
        .promo-banner {
            background: linear-gradient(90deg, #1e293b, #334155);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 15px;
            text-decoration: none;
            color: white;
            animation: pulse-glow 2s infinite ease-in-out;
            transition: transform 0.3s ease;
            max-width: 400px;
            width: 90%;
        }

        .promo-banner:hover { transform: scale(1.02); }

        .cta-button {
            background: var(--accent);
            color: var(--bg);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 5px rgba(34, 211, 238, 0.2); }
            50% { box-shadow: 0 0 20px rgba(34, 211, 238, 0.5); }
            100% { box-shadow: 0 0 5px rgba(34, 211, 238, 0.2); }
        }

        .game-wrapper {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 2rem;
            border-radius: 24px;
            text-align: center;
        }

        canvas {
            background: #0f172a;
            border-radius: 12px;
            max-width: 100%;
        }

        .controls {
            margin-top: 1.5rem;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            justify-items: center;
        }

        .controls button {
            width: 60px;
            height: 60px;
            border: 1px solid var(--border);
            background: var(--glass);
            color: white;
            border-radius: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="popup-overlay">
    <div class="popup-content">
        <button id="close-btn" onclick="closePopup()">×</button>
        <h2 class="popup-title">Destaque do Dia!</h2>
        <p>Não perca nossa oferta exclusiva preparada para você.</p>
        <a href="https://meli.la/19ug4W5" target="_blank" class="popup-link">APROVEITAR AGORA</a>
        <div id="timer-display">Aguarde <span id="seconds">5</span>s para fechar...</div>
    </div>
</div>

<a href="https://meli.la/19ug4W5" target="_blank" class="promo-banner">
    <div class="promo-text">⚡ Oferta Imperdível: Confira este produto!</div>
    <div class="cta-button">Ver Agora</div>
</a>

<div class="game-wrapper">
    <h1>Neon Maze</h1>
    <canvas id="maze" width="400" height="400"></canvas>
    <div class="controls">
        <button onmousedown="move('up')">↑</button>
        <button onmousedown="move('left')">←</button>
        <button onmousedown="move('down')">↓</button>
        <button onmousedown="move('right')">→</button>
    </div>
</div>

<script>
    // --- Lógica do Pop-up (Atualizada para animação) ---
    let timeLeft = 5;
    const overlay = document.getElementById('popup-overlay');
    const timerElement = document.getElementById('seconds');
    const closeBtn = document.getElementById('close-btn');
    const timerText = document.getElementById('timer-display');

    // Ativa a animação de entrada assim que a página carrega
    window.addEventListener('load', () => {
        overlay.classList.add('active');
    });

    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(countdown);
            closeBtn.style.display = 'flex'; // Mostra o botão de fechar como flex para alinhar o X
            timerText.innerText = "Você já pode fechar este anúncio.";
        }
    }, 1000);

    function closePopup() {
        overlay.style.display = 'none'; // Fecha o pop-up instantaneamente após o timer
    }

    // Lógica Original do Jogo Maze (Inalterada)
    const canvas = document.getElementById('maze');
    const ctx = canvas.getContext('2d');
    const cols = 15; const rows = 15;
    const cellSize = canvas.width / cols;
    let grid = []; let current; let stack = [];
    let player = { x: 0, y: 0 };
    let goal = { x: cols - 1, y: rows - 1 };

    class Cell {
        constructor(r, c) {
            this.r = r; this.c = c;
            this.walls = [true, true, true, true];
            this.visited = false;
        }
        show() {
            let x = this.c * cellSize; let y = this.r * cellSize;
            ctx.strokeStyle = "rgba(148, 163, 184, 0.3)";
            ctx.lineWidth = 2;
            if (this.walls[0]) line(x, y, x + cellSize, y);
            if (this.walls[1]) line(x + cellSize, y, x + cellSize, y + cellSize);
            if (this.walls[2]) line(x + cellSize, y + cellSize, x, y + cellSize);
            if (this.walls[3]) line(x, y + cellSize, x, y);
        }
    }

    function line(x1, y1, x2, y2) {
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }

    function setup() {
        grid = [];
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) { grid.push(new Cell(r, c)); }
        }
        current = grid[0];
        generate();
        draw();
    }

    function generate() {
        current.visited = true;
        let next = checkNeighbors(current);
        if (next) {
            next.visited = true;
            stack.push(current);
            removeWalls(current, next);
            current = next;
            generate();
        } else if (stack.length > 0) {
            current = stack.pop();
            generate();
        }
    }

    function checkNeighbors(cell) {
        let neighbors = [];
        let { r, c } = cell;
        let top = grid[index(r - 1, c)];
        let right = grid[index(r, c + 1)];
        let bottom = grid[index(r + 1, c)];
        let left = grid[index(r, c - 1)];
        if (top && !top.visited) neighbors.push(top);
        if (right && !right.visited) neighbors.push(right);
        if (bottom && !bottom.visited) neighbors.push(bottom);
        if (left && !left.visited) neighbors.push(left);
        return neighbors.length > 0 ? neighbors[Math.floor(Math.random() * neighbors.length)] : undefined;
    }

    function index(r, c) {
        if (r < 0 || c < 0 || r > rows - 1 || c > cols - 1) return -1;
        return c + r * cols;
    }

    function removeWalls(a, b) {
        let x = a.c - b.c;
        if (x === 1) { a.walls[3] = false; b.walls[1] = false; }
        else if (x === -1) { a.walls[1] = false; b.walls[3] = false; }
        let y = a.r - b.r;
        if (y === 1) { a.walls[0] = false; b.walls[2] = false; }
        else if (y === -1) { a.walls[2] = false; b.walls[0] = false; }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        grid.forEach(cell => cell.show());
        ctx.fillStyle = '#4ade80'; ctx.fillRect(goal.x * cellSize + 8, goal.y * cellSize + 8, cellSize - 16, cellSize - 16);
        ctx.fillStyle = '#22d3ee'; ctx.beginPath();
        ctx.arc(player.x * cellSize + cellSize/2, player.y * cellSize + cellSize/2, cellSize/4, 0, Math.PI * 2);
        ctx.fill();
    }

    function move(dir) {
        let cell = grid[index(player.y, player.x)];
        if (dir === 'up' && !cell.walls[0]) player.y--;
        if (dir === 'right' && !cell.walls[1]) player.x++;
        if (dir === 'down' && !cell.walls[2]) player.y--;
        if (dir === 'left' && !cell.walls[3]) player.x--;
        draw();
        if (player.x === goal.x && player.y === goal.y) {
            setTimeout(() => { alert("Nível Concluído!"); player = { x: 0, y: 0 }; setup(); }, 100);
        }
    }

    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowUp') move('up');
        if (e.key === 'ArrowRight') move('right');
        if (e.key === 'ArrowDown') move('down');
        if (e.key === 'ArrowLeft') move('left');
    });

    setup();
</script>

</body>
</html>
